services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Хранить БД на томе, а не в образе. / Keep the DB on a volume, not in the image.
      DATABASE_URL: sqlite:////data/project_board.db
    volumes:
      - board_data:/data
    restart: unless-stopped

volumes:
  board_data:
