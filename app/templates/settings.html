{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>{{ t('settings') }}</h1>
  {% if saved %}<p class="ok-msg">✓ {{ t('save') }}</p>{% endif %}
  <form method="post" action="/settings">
    <h2>{{ t('notifications') }}</h2>
    <label>{{ t('email') }}
      <input type="email" name="email" value="{{ user.email or '' }}" placeholder="you@example.com">
    </label>
    <label>{{ t('telegram_chat_id') }}
      <input type="text" name="telegram_chat_id" value="{{ user.telegram_chat_id or '' }}" placeholder="123456789">
    </label>
    <p class="muted small">{{ t('telegram_help') }}</p>

    <h2>{{ t('language') }}</h2>
    <label class="radio">
      <input type="radio" name="lang_pref" value="ru" {{ 'checked' if user.lang == 'ru' else '' }}> Русский
    </label>
    <label class="radio">
      <input type="radio" name="lang_pref" value="en" {{ 'checked' if user.lang == 'en' else '' }}> English
    </label>

    <div class="form-actions">
      <button type="submit" class="btn primary">{{ t('save_settings') }}</button>
    </div>
  </form>
</div>
{% endblock %}
