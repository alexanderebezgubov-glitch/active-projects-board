<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('app_title') }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">📋 {{ t('app_title') }}</a>
  <nav class="topnav">
    {% if user %}
      <a href="/">{{ t('board') }}</a>
      <a href="/import">{{ t('import') }}</a>
      <a href="/settings">{{ t('settings') }}</a>
      <span class="sep">|</span>
    {% endif %}
    <span class="langswitch">
      <a href="/set-lang/ru" class="{{ 'active' if lang == 'ru' else '' }}">RU</a>
      <a href="/set-lang/en" class="{{ 'active' if lang == 'en' else '' }}">EN</a>
    </span>
    {% if user %}
      <span class="sep">|</span>
      <span class="who">{{ user.username }}</span>
      <a href="/logout">{{ t('logout') }}</a>
    {% endif %}
  </nav>
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>
</body>
</html>
